name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    name: Build & publish — ${{ matrix.platform }}
    permissions:
      contents: write

    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundle_dir: nsis
          # - platform: macos-latest
          #   target: aarch64-apple-darwin
          #   bundle_dir: macos
          # - platform: ubuntu-22.04
          #   target: x86_64-unknown-linux-gnu
          #   bundle_dir: appimage

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          node scripts/set-version.mjs "${VERSION#v}"

      - name: Pack bundled widgets
        run: pnpm pack:examples

      - name: Check signing key is present
        shell: bash
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is not set"
            exit 1
          fi
          echo "Signing key present (${#TAURI_SIGNING_PRIVATE_KEY} chars)"

      - name: Build
        working-directory: apps/desktop
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Authenticode sign installer (Windows)
        if: matrix.platform == 'windows-latest' && env.WINDOWS_CERTIFICATE != ''
        shell: pwsh
        run: |
          $bundleDir = "apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/${{ matrix.bundle_dir }}"
          $exe = (Get-ChildItem "$bundleDir" -MaxDepth 1 -Filter "*-setup.exe" | Select-Object -First 1).FullName
          if (-not $exe) { Write-Error "Installer .exe not found in $bundleDir"; exit 1 }

          # Decode and install certificate
          $certPath = "$env:TEMP\vyntra-cert.pfx"
          [System.IO.File]::WriteAllBytes($certPath, [System.Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))

          # Locate signtool
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" -ErrorAction SilentlyContinue | Where-Object { $_.FullName -match "x64" } | Select-Object -First 1).FullName
          if (-not $signtool) { Write-Error "signtool.exe not found"; exit 1 }

          Write-Host "Signing: $exe"
          & $signtool sign `
            /fd sha256 /td sha256 `
            /tr http://timestamp.digicert.com `
            /f $certPath `
            /p $env:WINDOWS_CERTIFICATE_PASSWORD `
            $exe

          # Re-create .nsis.zip from the signed exe so the updater also ships signed binaries
          $exeName = [System.IO.Path]::GetFileName($exe)
          $zipPath = "$bundleDir\$exeName.nsis.zip"
          Push-Location $bundleDir
          Compress-Archive -Force -Path $exeName -DestinationPath $zipPath
          Pop-Location

          Remove-Item $certPath -Force
          Write-Host "Authenticode signing complete."

      - name: Sign update bundle
        shell: bash
        run: |
          REPO_ROOT=$(pwd)
          BUNDLE_DIR="apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/${{ matrix.bundle_dir }}"

          ZIP=$(find "$BUNDLE_DIR" -maxdepth 1 -name "*.nsis.zip" | head -1)
          if [ -z "$ZIP" ]; then
            echo "::error::No .nsis.zip found in $BUNDLE_DIR"
            find "$BUNDLE_DIR" -maxdepth 1 2>/dev/null | head -20
            exit 1
          fi

          echo "Signing: $ZIP"
          (cd apps/desktop && pnpm tauri signer sign \
            -k "$TAURI_SIGNING_PRIVATE_KEY" \
            -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
            "$REPO_ROOT/$ZIP")

          echo "SIG_FILE=${ZIP}.sig" >> $GITHUB_ENV
          echo "ZIP_FILE=$ZIP" >> $GITHUB_ENV
          echo "ZIP_NAME=$(basename $ZIP)" >> $GITHUB_ENV

      - name: Generate latest.json
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          node scripts/generate-latest-json.mjs \
            "$VERSION" \
            "${{ github.ref_name }}" \
            "$SIG_FILE" \
            "$ZIP_NAME" \
            "NicolasLOJO/vyntra"
          cat latest.json

      - name: Find installer
        shell: bash
        run: |
          BUNDLE_DIR="apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/${{ matrix.bundle_dir }}"
          INSTALLER=$(find "$BUNDLE_DIR" -maxdepth 1 -name "*-setup.exe" | head -1)
          echo "INSTALLER=$INSTALLER" >> $GITHUB_ENV

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Vyntra ${{ github.ref_name }}" \
            --notes "## Installation

          Télécharge et exécute le fichier \`.exe\` ci-dessous pour installer Vyntra.

          Les mises à jour futures se feront automatiquement depuis l'application." \
            "$INSTALLER" \
            "$ZIP_FILE" \
            "$SIG_FILE" \
            latest.json
